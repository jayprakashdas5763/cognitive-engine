version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cognitive-engine-backend
    ports:
      - "8000:8000"
    environment:
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
      - ENVIRONMENT=${ENVIRONMENT:-development}
    volumes:
      - .:/app
    command: python -m uvicorn backend.api:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cognitive-network

  frontend:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: cognitive-engine-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NODE_ENV=${ENVIRONMENT:-development}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cognitive-network

networks:
  cognitive-network:
    driver: bridge
